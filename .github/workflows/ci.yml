name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history for secret scanning

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: HTML validation
        run: npm run lint:html --if-present

      - name: CSS validation
        run: npm run lint:css --if-present

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run type-check --if-present

      - name: SAST (Semgrep)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config auto --error --quiet \
            --exclude-rule javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal \
            --exclude-rule javascript.express.security.audit.express-path-join-resolve-traversal.express-path-join-resolve-traversal \
            --exclude-rule javascript.express.security.audit.express-res-sendfile.express-res-sendfile \
            --exclude-rule javascript.express.security.audit.remote-property-injection.remote-property-injection

      - name: Dependency audit
        run: npm run security

      - name: License check
        run: npm run licenses

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
